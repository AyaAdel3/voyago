<div class="restaurantpage">

  <div *ngIf="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p>Finding the best restaurants for you…</p>
  </div>

  <div *ngIf="!loading" class="restaurants-page">
    <div
      *ngFor="let r of restaurants"
      class="restaurant-card"
      [class.card-inactive]="r.status === 'Inactive'"
      (click)="r.status !== 'Inactive' && goToDetails(r.id)"
    >
      <div class="card-img-wrap">
        <img [src]="r.images[0]" [alt]="r.name" class="card-img" loading="lazy" />

        <button
          class="fav-btn"
          [class.active]="isRestaurantInFav(r.name)"
          (click)="toggleFav($event, r)"
        >
          <svg viewBox="0 0 24 24" width="22" height="22">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              [attr.fill]="isRestaurantInFav(r.name) ? '#FFDE70' : 'none'"
              [attr.stroke]="isRestaurantInFav(r.name) ? '#FFDE70' : 'white'"
              stroke-width="2"
            />
          </svg>
        </button>

        <div class="inactive-overlay" *ngIf="r.status === 'Inactive'">
          🚫 Not available right now
        </div>
      </div>

      <div class="card-body font-[Nunito Sans]">
        <div class="card-header">
          <div>
            <h3 class="restaurant-name">{{ r.name }}</h3>
            <p class="restaurant-cuisine">{{ r.cuisine }} • {{ getPriceRange(r) }}</p>
          </div>

          <div class="rating-badge">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="#021526">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
            </svg>
            <span>{{ r.rating }}</span>
          </div>
        </div>

        <p class="restaurant-desc">{{ r.description }}</p>

        <div class="card-footer">
          <button
            class="btn-show"
            [disabled]="r.status === 'Inactive'"
            (click)="$event.stopPropagation(); r.status !== 'Inactive' && goToDetails(r.id)"
          >
            Show Restaurant
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
