<div class="attractions-page bg-[#021526]">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex justify-center items-center min-h-screen">
    <p class="text-white text-xl">Loading...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="!isLoading && error" class="flex justify-center items-center min-h-screen">
    <p class="text-red-400 text-xl">{{ error }}</p>
  </div>

  <!-- Data -->
  <div *ngIf="!isLoading && !error" class="attractions-list">
    <div
      *ngFor="let attraction of attractions"
      class="attraction-card"
      (click)="goToDetails(attraction.id)"
    >
      <div class="card-image">
        <img [src]="getImage(attraction)" [alt]="attraction.name" />
        <button class="heart-btn" (click)="toggleFavorite($event, attraction)">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              [attr.fill]="isFavorite(attraction.name) ? '#FFDE70' : 'none'"
              [attr.stroke]="isFavorite(attraction.name) ? '#FFDE70' : 'white'"
              stroke-width="2"
            />
          </svg>
        </button>
      </div>
      <div class="card-content">
        <div class="card-header">
          <h3 class="card-title text-white font-bold">{{ attraction.name }}</h3>
          <div class="card-rating">
            <span class="star text-[#FFDE70]">★</span>
            <span class="rating-number text-white">{{ attraction.rating }}</span>
          </div>
        </div>
        <p class="card-description text-gray-400 line-clamp-2">{{ attraction.description }}</p>
        <button class="show-btn" (click)="goToDetails(attraction.id); $event.stopPropagation()">
          Show place
        </button>
      </div>
    </div>
  </div>
</div>
