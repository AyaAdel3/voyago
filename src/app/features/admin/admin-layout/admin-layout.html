<div class="admin-shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="assets/images/logo.png" alt="VOYAGO" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"/>
      <span class="logo-fallback" style="display:none">🧭 VOYAGO</span>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         class="nav-item"
         [class.active]="isActive(item.path)">

        <!-- Dashboard -->
        <svg *ngIf="item.icon === 'dashboard'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
        <!-- Hotel -->
        <svg *ngIf="item.icon === 'hotel'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"/>
        </svg>
        <!-- Restaurant -->
        <svg *ngIf="item.icon === 'restaurant'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
        </svg>
        <!-- Attractions -->
        <svg *ngIf="item.icon === 'attractions'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M14 6l-1-2H5v17h2v-7h5l1 2h7V6h-6zm4 8h-4l-1-2H7V6h5l1 2h5v6z"/>
        </svg>
        <!-- Tour guide -->
        <svg *ngIf="item.icon === 'tour'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/>
        </svg>
        <!-- Users -->
        <svg *ngIf="item.icon === 'users'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <!-- Settings -->
        <svg *ngIf="item.icon === 'settings'" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>

        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">{{ currentTitle }}</h1>
        <p class="page-subtitle">{{ currentSubtitle }}</p>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="#888">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input type="text" placeholder="Search" class="search-input" />
        </div>
        <button class="notif-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
        <div class="avatar-wrap">AU</div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

   
  </div>
</div>
