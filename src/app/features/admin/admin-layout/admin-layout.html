<div class="admin-shell">
  <aside class="sidebar">
    <a class="sidebar-logo" routerLink="/admin">
      <div class="logo-icon">
        <img src="image/icon.png" alt="logo" />
      </div>
      <span class="logo-text">VOYAGO</span>
    </a>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        class="nav-item"
        [class.active]="isActive(item.path)"
      >
        <svg
          *ngIf="item.icon === 'dashboard'"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="currentColor"
        >
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" />
        </svg>
        <svg
          *ngIf="item.icon === 'hotel'"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="currentColor"
        >
          <path
            d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"
          />
        </svg>
        <svg
          *ngIf="item.icon === 'restaurant'"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="currentColor"
        >
          <path
            d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"
          />
        </svg>
        <svg
          *ngIf="item.icon === 'attractions'"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="currentColor"
        >
          <path d="M14 6l-1-2H5v17h2v-7h5l1 2h7V6h-6zm4 8h-4l-1-2H7V6h5l1 2h5v6z" />
        </svg>
        <svg
          *ngIf="item.icon === 'tour'"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="currentColor"
        >
          <path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z" />
        </svg>
        <svg
          *ngIf="item.icon === 'users'"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="currentColor"
        >
          <path
            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
          />
        </svg>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <!-- ✅ Logout Button -->
    <button class="sidebar-logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path
          d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
        />
      </svg>
      <span>Log Out</span>
    </button>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">{{ currentTitle }}</h1>
        <p class="page-subtitle">{{ currentSubtitle }}</p>
      </div>
      <div class="topbar-right">
        <button class="dark-pill" (click)="darkMode.toggle()">
          <svg
            *ngIf="darkMode.isDarkMode()"
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="#c8d6e8"
          >
            <path
              d="M21.4 13.7C20.6 17.4 17.4 20.2 13.5 20.5c-4.8.4-8.8-3.3-8.8-8 0-4.5 3.5-8.1 8-8.2.5 0 .6.7.2 1C11.4 6.5 10.8 8 11 9.5c.3 2.8 2.6 5 5.4 5.1 1.4.1 2.7-.3 3.7-1.1.5-.4 1.2.1 1 .6h.3z"
            />
          </svg>
          <svg
            *ngIf="!darkMode.isDarkMode()"
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M12 2a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm8-8a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2h1zM4 11a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2h1zm13.66-5.66a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zM7.05 16.95a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zm9.9 0a1 1 0 0 1 1.41 0l.71.71a1 1 0 1 1-1.41 1.41l-.71-.71a1 1 0 0 1 0-1.41zM5.64 5.64a1 1 0 0 1 1.41 0l.71.71A1 1 0 1 1 6.35 7.76l-.71-.71a1 1 0 0 1 0-1.41zM12 7a5 5 0 1 1 0 10A5 5 0 0 1 12 7z"
            />
          </svg>
          <span class="pill-label">{{ darkMode.isDarkMode() ? 'DARK' : 'LIGHT' }}<br />MODE</span>
        </button>
        <div class="avatar-wrap">AU</div>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
