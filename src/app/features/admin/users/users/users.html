<div>
  <h2 class="section-title">Users Management</h2>

  <div class="stats-row">
    <div *ngFor="let s of stats" class="stat-card" [ngClass]="s.type">
      <p class="stat-label">{{ s.label }}</p>
      <div class="stat-value">{{ s.value }} <span>{{ s.icon }}</span></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-search">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="#4a6a88">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" placeholder="Search Users..." [(ngModel)]="searchQuery" />
    </div>
  </div>

  <div class="admin-table">
    <div class="table-header users-grid">
      <span>Users Name</span>
      <span>Email</span>
      <span>Role</span>
      <span>Status</span>
      <span>Actions</span>
    </div>

    <div *ngFor="let u of filtered" class="table-row users-grid">
      <span class="cell-name">{{ u.name }}</span>
      <span class="cell-muted">{{ u.email }}</span>
      <span>
        <span class="role-badge" [ngClass]="roleClass(u.role)">{{ u.role }}</span>
      </span>
      <span>
        <span class="status-badge" [ngClass]="'status-' + u.status.toLowerCase()">{{ u.status }}</span>
      </span>
      <div class="actions-cell">
        <button class="btn-icon btn-delete" (click)="delete(u)">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="pagination">
    <button class="page-btn arrow">‹</button>
    <button *ngFor="let p of totalPages" class="page-btn" [class.active]="p === currentPage" (click)="currentPage = p">
      {{ p === 10 ? '...' : '' }}{{ p }}
    </button>
    <button class="page-btn arrow">›</button>
  </div>
</div>
