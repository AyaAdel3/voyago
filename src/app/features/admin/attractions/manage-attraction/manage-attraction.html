<div class="manage-page">
  <h2 class="section-title">{{ isEdit ? 'Manage' : 'Add' }} <strong>Attraction</strong></h2>

  <!-- ── Photos ── -->
  <label class="form-label">Attractions Photos <span class="req">*</span></label>
  <div class="photos-area">
    <div class="photos-grid-inner" *ngIf="allImages.length">
      <div *ngFor="let img of allImages; let i = index" class="photo-slot">
        <img [src]="img.url" alt="attraction" />
        <button
          class="photo-remove"
          (click)="removeImage(img.isExisting, img.id, img.newIndex)"
          type="button"
        >
          ✕
        </button>
      </div>
    </div>

    <div class="upload-empty" *ngIf="!allImages.length" (click)="fileInput.click()">
      <svg viewBox="0 0 24 24" width="36" height="36" fill="#7a9cbf">
        <path
          d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"
        />
      </svg>
      <span>Click to upload images</span>
      <span style="font-size: 0.75rem">Or Drag &amp; drop</span>
      <span style="font-size: 0.72rem; color: #4a6a88">PNG, JPG up to 5MB</span>
    </div>

    <button
      class="upload-circle-btn"
      type="button"
      (click)="fileInput.click()"
      *ngIf="allImages.length"
      title="Add more photos"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
        <path
          d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"
        />
      </svg>
    </button>
    <input
      #fileInput
      type="file"
      accept="image/*"
      multiple
      style="display: none"
      (change)="onFileSelected($event)"
    />
  </div>

  <!-- ── Name ── -->
  <div class="form-group">
    <label class="form-label">Attractions Name <span class="req">*</span></label>
    <input class="form-input" [(ngModel)]="attraction.name" placeholder="Enter Attraction Name" />
  </div>

  <!-- ── Row ── -->
  <div class="form-row">
    <div>
      <label class="form-label">Ticket Price (LE) <span class="req">*</span></label>
      <input
        class="form-input"
        [(ngModel)]="attraction.ticketPrice"
        type="number"
        placeholder="100"
      />
    </div>
    <div>
      <label class="form-label">Date of Inscription <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="attraction.dateOfInscription" type="number" />
    </div>
    <div>
      <label class="form-label">Location <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="attraction.location" placeholder="Enter Location" />
    </div>
    <div>
      <label class="form-label">Rating <span class="req">*</span></label>
      <input
        class="form-input"
        [(ngModel)]="attraction.rating"
        type="number"
        step="0.1"
        min="0"
        max="5"
      />
    </div>
  </div>

  <!-- ── Category ── -->
  <div class="form-group">
    <label class="form-label">Category <span class="req">*</span></label>
    <div class="features-tags" *ngIf="selectedCategoryIds.length">
      <span *ngFor="let id of selectedCategoryIds" class="feature-tag">
        {{ getCategoryLabel(id) }}
        <button type="button" class="feature-tag-remove" (click)="toggleCategory(id)">✕</button>
      </span>
    </div>
    <div class="features-dropdown-wrap">
      <button
        type="button"
        class="features-trigger"
        (click)="categoriesDropdownOpen = !categoriesDropdownOpen"
      >
        <span>{{ selectedCategoryIds.length ? 'Add more...' : 'Select category...' }}</span>
        <svg
          viewBox="0 0 24 24"
          width="16"
          height="16"
          fill="currentColor"
          [style.transform]="categoriesDropdownOpen ? 'rotate(180deg)' : 'rotate(0)'"
        >
          <path d="M7 10l5 5 5-5z" />
        </svg>
      </button>
      <div class="features-dropdown" *ngIf="categoriesDropdownOpen">
        <div
          *ngFor="let c of availableCategories"
          class="feature-option"
          [class.selected]="isCategorySelected(c.id)"
          (click)="toggleCategory(c.id)"
        >
          <span class="feature-icon">{{ c.icon }}</span>
          <span class="feature-name">{{ c.name }}</span>
          <svg
            *ngIf="isCategorySelected(c.id)"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            fill="#22c55e"
            style="margin-left: auto"
          >
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
          </svg>
        </div>
        <button type="button" class="features-done-btn" (click)="closeCategoryDropdown()">
          Done
        </button>
      </div>
    </div>
  </div>

  <!-- ── Description ── -->
  <div class="form-group">
    <label class="form-label">Attractions Description <span class="req">*</span></label>
    <textarea
      class="form-textarea"
      [(ngModel)]="attraction.description"
      placeholder="Enter detailed Attractions description..."
    ></textarea>
  </div>

  <!-- ── Actions ── -->
  <div class="form-actions">
    <button class="btn-save" (click)="save()" type="button" [disabled]="isSaving">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path
          d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"
        />
      </svg>
      {{ isSaving ? 'Saving...' : 'Save Attraction' }}
    </button>
    <button class="btn-clear" (click)="clear()" type="button">Clear</button>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" *ngIf="toastVisible">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="#22c55e">
    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
  </svg>
  {{ toastMessage }}
</div>
