<div class="manage-page">
  <h2 class="section-title">Manage Tour Guide</h2>

  <label class="form-label">Tour Guide Photos <span class="req">*</span></label>
  <div class="photos-grid" style="position:relative;margin-bottom:1.5rem">
    <div *ngFor="let img of images; let i = index" class="photo-slot">
      <img [src]="img" alt="guide" />
      <button class="photo-remove" (click)="removeImage(i)">✕</button>
    </div>
    <button class="upload-btn" style="right:-8px">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
      </svg>
    </button>
  </div>

  <!-- Row 1: Name, Email, Languages -->
  <div class="form-row">
    <div>
      <label class="form-label">Full Name <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="guide.name" placeholder="Enter Tour Guide Name" />
    </div>
    <div>
      <label class="form-label">Email <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="guide.email" type="email" placeholder="ex: sarah@rv.com" />
    </div>
    <div>
      <label class="form-label">Languages (comma-separated) <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="guide.languages" placeholder="ex: English,Chinese" />
    </div>
  </div>

  <!-- Row 2: Phone, Tours, Rating -->
  <div class="form-row">
    <div>
      <label class="form-label">Phone Number <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="guide.phone" placeholder="ex:+0101233456" />
    </div>
    <div>
      <label class="form-label">Tours Completed <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="guide.tours" type="number" placeholder="0" />
    </div>
    <div>
      <label class="form-label">Rating <span class="req">*</span></label>
      <input class="form-input" [(ngModel)]="guide.rating" type="number" step="0.1" min="0" max="5" />
    </div>
  </div>

  <!-- Description -->
  <div class="form-group">
    <label class="form-label">Tour Guide Description <span class="req">*</span></label>
    <textarea class="form-textarea" [(ngModel)]="guide.description" placeholder="Enter Tour Guide description..."></textarea>
  </div>

  <!-- Status -->
  <div class="status-section">
    <h4>Tour Guide Status <span class="req">*</span></h4>
    <div class="status-btns">
      <button class="btn-status btn-status-active" [class.selected]="guide.status === 'Active'" (click)="setStatus('Active')">
        <span style="width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block"></span>
        Active
      </button>
      <button class="btn-status btn-status-inactive" [class.selected]="guide.status === 'Inactive'" (click)="setStatus('Inactive')">
        <span style="width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block"></span>
        Inactive
      </button>
    </div>
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button class="btn-save" (click)="save()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
      </svg>
      Save Tour Guide
    </button>
    <button class="btn-clear" (click)="clear()">Clear</button>
  </div>
</div>
