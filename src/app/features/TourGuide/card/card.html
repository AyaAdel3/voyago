<div class="guidepage bg-[#021526]">

  <div *ngIf="error" class="error-wrap">
    <p>{{ error }}</p>
  </div>

  <div *ngIf="!error" class="guides-page">
    <div *ngFor="let guide of guides; trackBy: trackById" class="guide-card" (click)="openDetails(guide)">
      <div class="card-img-wrap">
        <img
          [src]="guide.image"
          [alt]="guide.name"
          class="card-img"
          loading="lazy"
          (error)="onImgError($event)"
        />
        <button
          class="fav-btn"
          [class.active]="isGuideInFav(guide.name)"
          (click)="toggleFav($event, guide)"
          aria-label="Add to favorites"
        >
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              [attr.fill]="isGuideInFav(guide.name) ? '#FFDE70' : 'none'"
              [attr.stroke]="isGuideInFav(guide.name) ? '#FFDE70' : 'white'"
              stroke-width="2"
            />
          </svg>
        </button>
      </div>

      <div class="card-body font-[Nunito Sans]">
        <div class="card-header translate-y-4 gap-[3px]">
          <div>
            <h3 class="guide-name">{{ guide.name }}</h3>
            <p class="guide-price">{{ guide.pricePerDay }}LE / day</p>
          </div>
          <div class="rating-badge me-2">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="#021526">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z" />
            </svg>
            <span>{{ guide.rating }}</span>
          </div>
        </div>

        <p class="guide-desc font-normal translate-y-4 line-clamp-2">
          {{ getShortDescription(guide.description) }}
        </p>

        <div class="card-footer">
          <button
            class="btn-show mb-1.5 me-2"
            (click)="openDetails(guide); $event.stopPropagation()"
          >
            Show more
          </button>
        </div>
      </div>
    </div>
  </div>

  <app-tour-guide-details
    *ngIf="selectedGuide"
    [guide]="selectedGuide"
    (closeDetails)="closeDetails()"
  >
  </app-tour-guide-details>
</div>
