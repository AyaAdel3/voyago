<div class="tour-guide-page">
  <div class="guides-list">
    <div class="guide-card" *ngFor="let guide of guides">
      <div class="guide-image-wrap">
        <img [src]="guide.image" [alt]="guide.name" class="guide-image" />
        <button class="like-btn" (click)="toggleLike(guide)">
          <svg
            *ngIf="guide.liked"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="#f5c518"
          >
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            />
          </svg>
          <svg
            *ngIf="!guide.liked"
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            />
          </svg>
        </button>
      </div>

      <div class="guide-info">
        <div class="guide-header">
          <h3 class="guide-name">{{ guide.name }}</h3>
          <span class="guide-rating">★ {{ guide.rating }}</span>
        </div>
        <p class="guide-desc">{{ guide.description }}</p>
        <button class="btn-show-more" (click)="openDetails(guide)">Show more</button>
      </div>
    </div>
  </div>

  <app-details *ngIf="selectedGuide" [guide]="selectedGuide" (closeDetails)="closeDetails()">
  </app-details>
</div>
