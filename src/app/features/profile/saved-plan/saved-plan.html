<main class="main-content">
  <h1 class="page-title">Your Plan</h1>

  <section class="plan-section">
    <h2 class="gold-label">Hotel</h2>
    <div class="hotel-display">
      <div *ngIf="myPlan?.hotel; else emptyHotel" class="card actual-card hotel-card">
        <img [src]="getImage(myPlan.hotel, 'hotel')" class="card-img" alt="Hotel">
        <div class="card-body">
          <h3>{{myPlan.hotel.name}}</h3>
          <button class="view-btn" (click)="goToDetails('hotels', myPlan.hotel.id)">View Details</button>
        </div>
      </div>
      <ng-template #emptyHotel>
        <div class="empty-slot wide"><span class="plus">+</span><p>Empty Hotel Slot</p></div>
      </ng-template>
    </div>
  </section>

  <section class="plan-section">
    <h2 class="gold-label">Restaurants</h2>
    <div class="cards-grid">
      <div *ngFor="let rest of myPlan?.restaurants" class="card actual-card">
        <img [src]="getImage(rest, 'rest')" class="card-img" alt="Restaurant">
        <div class="card-body">
          <h3>{{rest.name}}</h3>
          <button class="view-btn" (click)="goToDetails('restaurant', rest.id)">View Details</button>
        </div>
      </div>
      <div *ngFor="let i of getFillers(myPlan?.restaurants)" class="empty-slot">
        <span class="plus">+</span><p>Empty Restaurant</p>
      </div>
    </div>
  </section>

  <section class="plan-section">
    <h2 class="gold-label">Tourist Attractions</h2>
    <div class="cards-grid">
      <div *ngFor="let attr of myPlan?.attractions" class="card actual-card">
        <img [src]="getImage(attr, 'attr')" class="card-img" alt="Attraction">
        <div class="card-body">
          <h3>{{attr.name}}</h3>
          <button class="view-btn" (click)="goToDetails('tourist-attraction', attr.id)">View Details</button>
        </div>
      </div>
      <div *ngFor="let i of getFillers(myPlan?.attractions)" class="empty-slot">
        <span class="plus">+</span><p>Empty Attraction</p>
      </div>
    </div>
  </section>
</main>
