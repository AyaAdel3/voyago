<div class="profile-shell" [class.dark-profile]="isDarkMode">
  <aside class="profile-sidebar">
    <a class="profile-logo" routerLink="/home">
      <div class="logo-icon">
        <img src="image/icon.png" alt="logo" />
      </div>
      <span class="logo-text">VOYAGO</span>
    </a>

    <div class="profile-avatar-wrap">
      <div class="image-container">
        <div class="image-inner">
          @if (profileImage()) {
            <img [src]="profileImage()" class="profile-img" alt="Profile" />
          } @else {
            <div class="profile-placeholder">
              <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
          }
        </div>

        <button class="camera-btn" (click)="fileInput.click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </button>

        @if (profileImage()) {
          <button class="remove-btn" (click)="removeProfileImage()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        }

        <input #fileInput type="file" accept="image/*" style="display:none" (change)="onImageSelected($event)" />
      </div>
      <p class="profile-name">{{ userName }}</p>
    </div>

    <nav class="profile-nav">
      <a routerLink="/profile/personal-information" routerLinkActive="active" class="profile-nav-item">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>Personal Information</span>
      </a>
      <a routerLink="/profile/favorites" routerLinkActive="active" class="profile-nav-item">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <span>Favorites</span>
      </a>
      <a routerLink="/profile/saved-plan" routerLinkActive="active" class="profile-nav-item">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
        </svg>
        <span>Saved Plan</span>
      </a>
    </nav>

    <button class="profile-logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
      </svg>
      <span>Log Out</span>
    </button>
  </aside>

  <div class="profile-main">
    <header class="profile-topbar">
      <div class="profile-topbar-left">
        <h1 class="profile-page-title">{{ currentTitle }}</h1>
      </div>
      <div class="profile-topbar-right">
        <div class="profile-avatar">{{ userInitials }}</div>
      </div>
    </header>
    <main class="profile-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- ✅ Crop Modal -->
@if (showCropper) {
  <div class="crop-modal">
    <div class="crop-box">
      <h3 class="crop-title">Crop Your Photo</h3>
     <image-cropper
  [imageChangedEvent]="imageChangedEvent"
  [maintainAspectRatio]="true"
  [aspectRatio]="1"
  format="jpeg"
  [output]="'base64'"
  (imageCropped)="onImageCropped($event)"
  [roundCropper]="true"
></image-cropper>
      <div class="crop-actions">
        <button class="crop-cancel" (click)="cancelCrop()">Cancel</button>
        <button class="crop-save" (click)="saveCrop()">Save</button>
      </div>
    </div>
  </div>
}
