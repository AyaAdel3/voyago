<div class="profile-layout">
  <aside class="sidebar">
    <div class="profile-header">
      <div class="image-container">
        <img src="https://i.pravatar.cc/150?img=47" alt="Profile">
        <span class="camera-btn">📷</span>
      </div>
    </div>
    <nav class="nav-links">
      <a routerLink="/profile/personal-information" routerLinkActive="active" class="active-link">
        <span class="icon">👤</span> Personal Information
      </a>
      <a routerLink="/profile/favorites" routerLinkActive="active">
        <span class="icon">🤍</span> Favorites
      </a>
      <a routerLink="/profile/saved-plan" routerLinkActive="active">
        <span class="icon">🔖</span> Saved Plan
      </a>
    </nav>
    <button class="logout-btn">
      <span class="icon">↪</span> Log Out
    </button>
  </aside>

  <main class="content">
    <div class="info-header">
      <h1>Personal Information</h1>
      <button class="edit-btn" *ngIf="!isEditing" (click)="onEdit()">Edit</button>
      <button class="save-btn" *ngIf="isEditing" (click)="onSave()">Save</button>
    </div>

    <div class="details-container">
      <ng-container *ngIf="!isEditing">
        <div class="info-row">
          <p class="data-value">{{ user.name }}</p>
        </div>
        <div class="info-row">
          <p class="data-value">{{ user.email }}</p>
        </div>
        <div class="info-row">
          <p class="data-value">{{ user.phone }}</p>
        </div>
      </ng-container>

      <ng-container *ngIf="isEditing">
        <div class="edit-row">
          <input type="text" [(ngModel)]="editData.name" class="profile-input" placeholder="Full Name">
        </div>
        <div class="edit-row">
          <input type="email" [(ngModel)]="editData.email" class="profile-input" placeholder="Email" (blur)="validateEmail()">
          <span class="error-msg" *ngIf="emailError">{{ emailError }}</span>
        </div>
        <div class="edit-row">
          <input type="text" [(ngModel)]="editData.phone" class="profile-input" placeholder="Phone" (blur)="validatePhone()">
          <span class="error-msg" *ngIf="phoneError">{{ phoneError }}</span>
        </div>
      </ng-container>
    </div>
  </main>
</div>
