<div class="profile-layout">


  <main class="content">
    <div class="info-header">
      <h1>Personal Information</h1>
      <button class="edit-btn" *ngIf="!isEditing" (click)="onEdit()">Edit</button>
      <button class="save-btn" *ngIf="isEditing" (click)="onSave()">Save</button>
    </div>

    <div class="details-container">

      <!-- View Mode -->
      <ng-container *ngIf="!isEditing">
        <div class="info-row">
          <p class="data-value">{{ user.firstName }} {{ user.lastName }}</p>
        </div>
        <div class="info-row">
          <p class="data-value">{{ user.email }}</p>
        </div>
        <div class="info-row">
          <p class="data-value">{{ user.phone }}</p>
        </div>
      </ng-container>

      <!-- Edit Mode -->
      <ng-container *ngIf="isEditing">
        <div class="edit-row">
          <input type="text" [(ngModel)]="editData.firstName" class="profile-input" placeholder="First Name" />
        </div>
        <div class="edit-row">
          <input type="text" [(ngModel)]="editData.lastName" class="profile-input" placeholder="Last Name" />
        </div>
        <!-- Email ثابت مش بيتعدل -->
        <div class="edit-row">
          <input type="email" [value]="user.email" class="profile-input disabled-input" placeholder="Email" disabled />
        </div>
        <div class="edit-row">
          <input type="text" [(ngModel)]="editData.phone" class="profile-input" placeholder="Phone" (blur)="validatePhone()" />
          <span class="error-msg" *ngIf="phoneError">{{ phoneError }}</span>
        </div>
      </ng-container>

    </div>
  </main>
</div>
