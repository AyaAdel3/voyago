<main class="content">
  <div *ngIf="isLoading" class="flex justify-center items-center py-10">
    <p class="text-gray-400">Loading...</p>
  </div>

  <ng-container *ngIf="!isLoading">
    <div class="pi-card">
      <div class="pi-header">
        <div>
          <!-- الصورة جوه الهيدر في الموبايل -->
          <div class="image-container-mobile mobile-only">
            <div class="image-inner-mobile">
              @if (profileImage) {
                <img [src]="profileImage" class="profile-img" alt="Profile" />
              } @else {
                <div class="profile-img-placeholder">
                  <svg
                    width="40"
                    height="40"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#ccc"
                    stroke-width="1.5"
                  >
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                </div>
              }
            </div>
            <label class="mobile-camera-btn">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
                />
                <circle cx="12" cy="13" r="4" />
              </svg>
              <input
                type="file"
                accept="image/*"
                style="display: none"
                (change)="onImageSelected($event)"
              />
            </label>
          </div>

          <p class="pi-title">Personal information</p>
          <p class="pi-subtitle">Manage your account details</p>
        </div>

        <ng-container *ngIf="!isEditing">
          <button class="edit-btn" (click)="onEdit()">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            Edit
          </button>
        </ng-container>

        <ng-container *ngIf="isEditing">
          <button class="edit-btn" (click)="onSave()">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
            Save
          </button>
        </ng-container>
      </div>

      <hr class="pi-divider" />

      <ng-container *ngIf="!isEditing">
        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div>
            <p class="pi-label">Full name</p>
            <p class="pi-value">{{ user.firstName }} {{ user.lastName }}</p>
          </div>
        </div>

        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </div>
          <div>
            <p class="pi-label">Email address</p>
            <p class="pi-value">{{ user.email }}</p>
          </div>
        </div>

        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.63a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
              />
            </svg>
          </div>
          <div>
            <p class="pi-label">Phone number</p>
            <p class="pi-value">{{ user.phone }}</p>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="isEditing">
        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div class="pi-input-group">
            <p class="pi-label">First name</p>
            <input
              type="text"
              [(ngModel)]="editData.firstName"
              class="profile-input"
              placeholder="First Name"
            />
          </div>
        </div>

        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <div class="pi-input-group">
            <p class="pi-label">Last name</p>
            <input
              type="text"
              [(ngModel)]="editData.lastName"
              class="profile-input"
              placeholder="Last Name"
            />
          </div>
        </div>

        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </div>
          <div class="pi-input-group">
            <p class="pi-label">Email address</p>
            <input
              type="email"
              [value]="user.email"
              class="profile-input disabled-input"
              disabled
            />
          </div>
        </div>

        <div class="pi-row">
          <div class="pi-icon">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.63a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
              />
            </svg>
          </div>
          <div class="pi-input-group">
            <p class="pi-label">Phone number</p>
            <input
              type="text"
              [(ngModel)]="editData.phone"
              class="profile-input"
              placeholder="Phone"
              (blur)="validatePhone()"
            />
            <span class="error-msg" *ngIf="phoneError">{{ phoneError }}</span>
          </div>
        </div>
      </ng-container>
    </div>
  </ng-container>
</main>
