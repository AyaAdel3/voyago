<div class="profile-layout">
  <aside class="sidebar">
    <div class="image-container">
       <img src="https://i.pravatar.cc/150?img=47" alt="Profile">
      <button class="camera-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
      </button>
    </div>

    <nav class="nav-links">
      <a routerLink="/profile/personal-information" routerLinkActive="active-link">
        <span>👤</span> Personal Information
      </a>
      <a routerLink="/profile/favorites" routerLinkActive="active-link">
        <span>❤️</span> Favorites
      </a>
      <a routerLink="/profile/saved-plan" routerLinkActive="active-link">
       <span class="icon">🔖</span> Saved Plan
      </a>
    </nav>

     <button class="logout-btn">
      <span class="icon">↪</span> Log Out
    </button>
  </aside>

  <main class="content">
    <div class="info-header">
      <h1>Favourites</h1>
    </div>

    <div class="plan-grid">
      @for (item of myFavorites; track item.title; let i = $index) {
        <div class="favorite-card">
          <div class="card-image-wrapper">
            <img [src]="item.image" class="card-img" />
            <button class="remove-x-btn" (click)="deleteFav(i)">✕</button>
            <span class="heart-icon">💛</span>
          </div>
          <div class="card-info">
            <h3>{{ item.title }}</h3>
            <div class="item-meta">
              <span class="item-price">{{ item.price }}</span>
              <span class="dot">•</span>
              <span class="item-rating">⭐ {{ item.rating }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </main>
</div>
