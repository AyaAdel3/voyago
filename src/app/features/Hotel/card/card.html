<!-- ============================================================
  card.html  →  src/app/features/Hotel/card/
  قائمة الهوتيلات
============================================================ -->

<!-- Loading Spinner -->
 <div class="hotelpage bg-[#021526]">
<div *ngIf="loading" class="loading-wrap">
  <div class="spinner"></div>
  <p>Finding the best hotels for you…</p>
</div>

<!-- Hotels List -->
<div *ngIf="!loading" class="hotels-page ">
  <div
    *ngFor="let hotel of hotels"
    class="hotel-card "
    (click)="goToDetails(hotel.id)"
  >
    <!-- ── صورة + زرار القلب ── -->
    <div class="card-img-wrap">
      <img
        [src]="hotel.images[0]"
        [alt]="hotel.name"
        class="card-img"
        loading="lazy"
      />

      <!-- زرار الـ Favorite: stopPropagation عشان ميفتحش الصفحة -->
      <button
        class="fav-btn"
        [class.active]="hotelService.isFavorite(hotel.id)"
        (click)="toggleFav($event, hotel.id)"
        aria-label="Add to favorites"
      >
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
               2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
               C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
               c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            [attr.fill]="hotelService.isFavorite(hotel.id) ? '#FFDE70' : 'none'"
            [attr.stroke]="hotelService.isFavorite(hotel.id) ? '#FFDE70' : 'white'"
            stroke-width="2"
          />
        </svg>
      </button>
    </div>
   
    <!-- ── محتوى الكارد ── -->
    <div class="card-body font-[Nunito Sans]">
      <div class="card-header translate-y-4 gap-[3px]">
        <div>
          <h3 class="hotel-name color-[#173B64] ">{{ hotel.name }}</h3>
          <p class="hotel-price color-[#021526] font-medium ">{{ hotel.pricePerNight | number }}le for 1 night</p>
        </div>
        <!-- Rating Badge -->
        <div class="rating-badge me-2">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="#021526">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"/>
          </svg>
          <span>{{ hotel.rating }}</span>
        </div>
      </div>

      <p class="hotel-desc font-normal color-[#021526] translate-y-4">{{ hotel.description }}</p>

      <!-- Show Hotel Button -->
      <div class="card-footer">
        <button
          class="btn-show mb-1.5 me-2"
          (click)="goToDetails(hotel.id); $event.stopPropagation()"
        >
          Show hotel
        </button>
      </div>
    </div>
  </div>
</div>
 </div>
