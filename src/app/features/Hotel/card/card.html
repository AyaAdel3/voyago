<div class="hotelpage bg-[#021526]">
  <!-- Loading -->
  <div *ngIf="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p class="text-white text-xl">Loading...</p>
  </div>

  <!-- Hotels -->
  <div *ngIf="!loading" class="hotels-page">
    <div *ngFor="let hotel of pagedHotels" class="hotel-card" (click)="goToDetails(hotel.id)">
      <div class="card-img-wrap">
        <img [src]="hotel.mainImageUrl" [alt]="hotel.name" class="card-img" loading="lazy" />

        <button
          class="fav-btn"
          [class.active]="isHotelInFav(hotel.name)"
          (click)="toggleFav($event, hotel)"
          aria-label="Add to favorites"
        >
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                 C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              [attr.fill]="isHotelInFav(hotel.name) ? '#FFDE70' : 'none'"
              [attr.stroke]="isHotelInFav(hotel.name) ? '#FFDE70' : 'white'"
              stroke-width="2"
            />
          </svg>
        </button>
      </div>

      <div class="card-body font-[Nunito Sans]">
        <div class="card-header gap-[3px]">
          <div>
            <h3 class="hotel-name">{{ hotel.name }}</h3>
            <p class="hotel-price font-medium">{{ getPriceRange(hotel) }}</p>
          </div>

          <div class="rating-badge">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="#021526">
              <path
                d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21
                   12 17.77 5.82 21 7 14.14l-5-4.87
                   6.91-1.01L12 2z"
              />
            </svg>
            <span>{{ hotel.rating }}</span>
          </div>
        </div>

        <p class="hotel-desc font-normal">{{ hotel.description }}</p>

        <div class="card-footer">
          <button class="btn-show" (click)="goToDetails(hotel.id); $event.stopPropagation()">
            Show hotel
          </button>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 1">&#8249;</button>
      <button *ngFor="let p of pagesArray" [class.active]="p === currentPage" (click)="goToPage(p)">
        {{ p }}
      </button>
      <button (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages">
        &#8250;
      </button>
    </div>
  </div>
</div>
