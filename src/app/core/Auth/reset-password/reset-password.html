<div class="modal-overlay" (click)="modal.close()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="modal.close()">✕</button>
    <h1 class="modal-title" [style.textAlign]="lang.currentLang() === 'ar' ? 'right' : 'left'">
      {{ lang.t('reset.title') }}
    </h1>

    <div class="api-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <!-- New Password -->
      <div class="field-group">
        <div class="input-icon-wrap" [class.error-input]="isInvalid(password)">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            [placeholder]="lang.t('reset.password')"
          />
          <button type="button" class="eye-btn" (click)="togglePassword()">
            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
              />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <ng-container *ngIf="isInvalid(password)">
          <span class="error-msg" *ngIf="password.errors?.['required']">{{
            lang.t('err.passRequired')
          }}</span>
          <span class="error-msg" *ngIf="password.errors?.['minlength']">{{
            lang.t('err.passMin')
          }}</span>
          <span class="error-msg" *ngIf="password.errors?.['weakPassword']">{{
            lang.t('err.passWeak2')
          }}</span>
        </ng-container>
      </div>

      <!-- Confirm Password -->
      <div class="field-group">
        <div
          class="input-icon-wrap"
          [class.error-input]="
            isInvalid(confirmPassword) ||
            (confirmPassword.touched && form.errors?.['passwordMismatch'])
          "
        >
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            [placeholder]="lang.t('reset.confirmPass')"
          />
          <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
            <svg
              *ngIf="!showConfirmPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
              />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            <svg
              *ngIf="showConfirmPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <ng-container *ngIf="confirmPassword.touched">
          <span class="error-msg" *ngIf="confirmPassword.errors?.['required']">{{
            lang.t('err.confirmRequired')
          }}</span>
          <span
            class="error-msg"
            *ngIf="!confirmPassword.errors?.['required'] && form.errors?.['passwordMismatch']"
            >{{ lang.t('err.passMismatch') }}</span
          >
        </ng-container>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">{{ lang.t('reset.btn') }}</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
