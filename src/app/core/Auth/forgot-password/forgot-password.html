<div class="modal-overlay" (click)="modal.close()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="modal.close()">✕</button>
    <h1 class="modal-title">Reset Your Password</h1>

    <div class="api-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field-group">
        <input
          type="email"
          formControlName="email"
          placeholder="Enter your e-mail"
          [class.error-input]="isInvalid(email)"
        />
        <span class="error-msg" *ngIf="isInvalid(email) && email.errors?.['required']"
          >Email is required.</span
        >
        <span class="error-msg" *ngIf="isInvalid(email) && email.errors?.['email']"
          >Enter a valid email.</span
        >
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Send mail</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
