<div class="modal-overlay" (click)="modal.close()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="modal.close()">✕</button>
    <h1 class="modal-title">Enter Your Code</h1>

    <div class="api-error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field-group">
        <input
          type="text"
          formControlName="code"
          placeholder="Code"
          [class.error-input]="isInvalid(code)"
          maxlength="6"
        />
        <span class="error-msg" *ngIf="isInvalid(code) && code.errors?.['required']"
          >Code is required.</span
        >
        <span class="error-msg" *ngIf="isInvalid(code) && code.errors?.['minlength']"
          >Enter a valid code.</span
        >
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Submit</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <p class="switch-link">Didn't Get Code? <a (click)="resendCode()">resend code</a></p>
    </form>
  </div>
</div>
