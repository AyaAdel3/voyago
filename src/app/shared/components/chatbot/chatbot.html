<!-- FAB Button -->
<div class="chat-wrapper">
  <button class="chat-fab" (click)="toggle()" aria-label="Open chat" *ngIf="!isOpen">
    <img
      src="image/pana.png"
      alt="Emma"
      style="width: 100%; height: 100%; object-fit: cover; object-position: center top"
    />
  </button>

  <!-- Overlay + Popup -->
  <div class="chat-overlay" *ngIf="isOpen" (click)="close()">
    <div class="chat-modal" (click)="$event.stopPropagation()">
      <button class="close-btn" (click)="close()">✕</button>
      <h1 class="modal-title">Live Chat</h1>

      <!-- Messages -->
      <div class="chat-messages">
        <div
          *ngFor="let msg of messages"
          class="msg-row"
          [class.msg-bot-row]="msg.sender === 'bot'"
          [class.msg-user-row]="msg.sender === 'user'"
        >
          <div class="msg-avatar" *ngIf="msg.sender === 'bot'">
            <img
              src="image/pana.png"
              alt="Emma"
              style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%"
            />
          </div>
          <div
            class="msg-bubble"
            [class.bot-bubble]="msg.sender === 'bot'"
            [class.user-bubble]="msg.sender === 'user'"
          >
            {{ msg.text }}
          </div>
          <div class="msg-avatar user-av" *ngIf="msg.sender === 'user'">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#a3c4eb">
              <path
                d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"
              />
            </svg>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-row">
        <input
          type="text"
          class="chat-input"
          placeholder="Type a message..."
          [(ngModel)]="userInput"
          (keydown)="onKeyDown($event)"
        />
        <button class="chat-send-btn" (click)="sendMessage()">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#173b64">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
