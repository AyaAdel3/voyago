<!-- FAB Button -->
<div class="chat-wrapper">
  <button class="chat-fab" (click)="toggle()" aria-label="Open chat" *ngIf="!isOpen">
    <img
      src="image/pana.png"
      alt="Emma"
      style="width: 100%; height: 100%; object-fit: cover; object-position: center top"
    />
  </button>

  <!-- Overlay + Popup -->
  <div class="chat-overlay" *ngIf="isOpen">
    <div class="chat-modal" (click)="$event.stopPropagation()">
      <button class="close-btn" (click)="close()">✕</button>
      <h1 class="modal-title">Live Chat</h1>

      <!-- زرار مسح الهيستوري — بيظهر بس لو في أكتر من رسالة -->
      <button
        class="clear-btn"
        *ngIf="messages.length > 1"
        (click)="showClearConfirm = true"
        title="Clear chat history"
      >
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
        </svg>
        Clear
      </button>

      <!-- Confirmation dialog -->
      <div class="clear-confirm" *ngIf="showClearConfirm">
        <p>Clear all chat history?</p>
        <div class="confirm-btns">
          <button class="btn-cancel-clear" (click)="showClearConfirm = false">Cancel</button>
          <button class="btn-confirm-clear" (click)="clearHistory()">Clear</button>
        </div>
      </div>

      <!-- Messages -->
      <div class="chat-messages" #msgContainer (scroll)="onScroll()">
        <div
          *ngFor="let msg of messages"
          class="msg-row"
          [class.msg-bot-row]="msg.sender === 'bot'"
          [class.msg-user-row]="msg.sender === 'user'"
        >
          <!-- Bot Avatar -->
          <div class="msg-avatar" *ngIf="msg.sender === 'bot'">
            <img
              src="image/pana.png"
              alt="Emma"
              style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%"
            />
          </div>

          <!-- Bubble + Cards -->
          <div class="msg-content">
            <div
              class="msg-bubble"
              [class.bot-bubble]="msg.sender === 'bot'"
              [class.user-bubble]="msg.sender === 'user'"
              [class.emergency-bubble]="msg.type === 'emergency'"
            >
              {{ msg.text }}
            </div>

            <!-- Result Cards -->
            <div class="msg-cards" *ngIf="msg.cards && msg.cards.length">
              <button
                *ngFor="let card of msg.cards"
                class="msg-card"
                (click)="navigateToCard(card)"
                title="Click to view details"
              >
                <!-- Card Type Icon -->
                <span class="card-type-icon">
                  <ng-container [ngSwitch]="card.item_type">
                    <!-- Hotel -->
                    <svg
                      *ngSwitchCase="'hotel'"
                      viewBox="0 0 24 24"
                      width="13"
                      height="13"
                      fill="currentColor"
                    >
                      <path
                        d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"
                      />
                    </svg>
                    <!-- Restaurant -->
                    <svg
                      *ngSwitchCase="'restaurant'"
                      viewBox="0 0 24 24"
                      width="13"
                      height="13"
                      fill="currentColor"
                    >
                      <path
                        d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-4.5-6.72-5-8.03-5C5.55 9.99 1 10.5 1 14.99v1h15.03v-1z"
                      />
                    </svg>
                    <!-- Attraction -->
                    <svg
                      *ngSwitchCase="'attraction'"
                      viewBox="0 0 24 24"
                      width="13"
                      height="13"
                      fill="currentColor"
                    >
                      <path
                        d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
                      />
                    </svg>
                    <!-- Tour Guide -->
                    <svg
                      *ngSwitchCase="'tour_guide'"
                      viewBox="0 0 24 24"
                      width="13"
                      height="13"
                      fill="currentColor"
                    >
                      <path
                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                      />
                    </svg>
                    <!-- Default -->
                    <svg
                      *ngSwitchDefault
                      viewBox="0 0 24 24"
                      width="13"
                      height="13"
                      fill="currentColor"
                    >
                      <path
                        d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
                      />
                    </svg>
                  </ng-container>
                </span>

                <span class="card-name">{{ card.name }}</span>

                <span class="card-rating" *ngIf="card.rating">⭐ {{ card.rating }}</span>

                <!-- Arrow icon -->
                <svg
                  class="card-arrow"
                  viewBox="0 0 24 24"
                  width="12"
                  height="12"
                  fill="currentColor"
                >
                  <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- User Avatar -->
          <div class="msg-avatar user-av" *ngIf="msg.sender === 'user'">
            <img
              *ngIf="currentUserAvatar"
              [src]="currentUserAvatar"
              alt="You"
              class="user-avatar-img"
            />
            <span *ngIf="!currentUserAvatar" class="user-avatar-initial">
              {{ currentUserInitial || 'U' }}
            </span>
          </div>
        </div>

        <!-- Loading dots -->
        <div class="msg-row msg-bot-row" *ngIf="isLoading">
          <div class="msg-avatar">
            <img
              src="image/pana.png"
              alt="Emma"
              style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%"
            />
          </div>
          <div class="msg-bubble bot-bubble loading-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-row">
        <input
          type="text"
          class="chat-input"
          placeholder="Type a message..."
          [(ngModel)]="userInput"
          (keydown)="onKeyDown($event)"
          [disabled]="isLoading"
        />
        <button class="chat-send-btn" (click)="sendMessage()" [disabled]="isLoading">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#173b64">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
