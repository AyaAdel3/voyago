<nav class="navbar">
  <!-- ── ROW 1 ── -->
  <div class="row-top flex align-middle justify-between">
    <div class="flex align-middle gap-1.5">
      <a routerLink="/home" routerLinkActive="active-link" class="flex align-middle gap-0.5 my-1">
        <div class="logo-icon rounded-2xl w-7 h-7">
          <img src="image/icon.png" alt="logo" />
        </div>
        <span class="logo-text font-semibold font-[manrope]">VOYAGO</span>
      </a>

      <!-- Dark/Light toggle -->
      <button class="dark-pill" (click)="toggleDarkMode()">
        <svg *ngIf="isDarkMode" width="13" height="13" viewBox="0 0 24 24" fill="#c8d6e8">
          <path
            d="M21.4 13.7C20.6 17.4 17.4 20.2 13.5 20.5c-4.8.4-8.8-3.3-8.8-8 0-4.5 3.5-8.1 8-8.2.5 0 .6.7.2 1C11.4 6.5 10.8 8 11 9.5c.3 2.8 2.6 5 5.4 5.1 1.4.1 2.7-.3 3.7-1.1.5-.4 1.2.1 1 .6h.3z"
          />
        </svg>
        <svg *ngIf="!isDarkMode" width="13" height="13" viewBox="0 0 24 24" fill="#ffffff">
          <path
            d="M12 2a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm8-8a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2h1zM4 11a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2h1zm13.66-5.66a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zM7.05 16.95a1 1 0 0 1 0 1.41l-.71.71a1 1 0 1 1-1.41-1.41l.71-.71a1 1 0 0 1 1.41 0zm9.9 0a1 1 0 0 1 1.41 0l.71.71a1 1 0 1 1-1.41 1.41l-.71-.71a1 1 0 0 1 0-1.41zM5.64 5.64a1 1 0 0 1 1.41 0l.71.71A1 1 0 1 1 6.35 7.76l-.71-.71a1 1 0 0 1 0-1.41zM12 7a5 5 0 1 1 0 10A5 5 0 0 1 12 7z"
          />
        </svg>
        <span class="pill-label">{{ isDarkMode ? 'DARK' : 'LIGHT' }}<br />MODE</span>
      </button>

      <!-- Language toggle -->
      <button class="lang-pill" (click)="lang.toggle()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
          />
        </svg>
        <span class="pill-label">{{ lang.currentLang() === 'en' ? 'EN' : 'AR' }}</span>
      </button>
    </div>

    <div class="auth-group">
      <a class="become-host">{{ lang.t('nav.becomeHost') }}</a>
      <button class="btn-outline" (click)="modal.openLogin()">{{ lang.t('nav.login') }}</button>
      <button class="btn-outline" (click)="modal.openSignup()">{{ lang.t('nav.signup') }}</button>
    </div>
  </div>

  <!-- ── ROW 2 ── -->
  <div class="row-links flex align-middle justify-center">
    <a routerLink="/hotels" class="nav-link" [class.active-link]="isHotelsActive()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
      </svg>
      {{ lang.t('nav.hotels') }}
    </a>

    <a routerLink="/Restaurants" class="nav-link" [class.active-link]="isRestaurantsActive()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"
        />
      </svg>
      {{ lang.t('nav.restaurants') }}
    </a>

    <a routerLink="/Attractions" class="nav-link" [class.active-link]="isAttractionsActive()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44 1.71-5.56 1.71-8 0C6.78 20.53 5.39 21 4 21H2v2h2c1.38 0 2.74-.35 4-.99 2.52 1.29 5.48 1.29 8 0 1.26.65 2.62.99 4 .99h2v-2h-2zM3.95 19H4c1.6 0 3.02-.88 4-2 .98 1.12 2.4 2 4 2s3.02-.88 4-2c.98 1.12 2.4 2 4 2h.05l1.89-6.68c.08-.26.06-.54-.06-.78s-.34-.42-.6-.5L20 10.62V6c0-1.1-.9-2-2-2h-3V1L8 8h8v2.62l-1.27.42c-.26.09-.48.26-.6.5s-.15.52-.06.78L15.95 19H3.95z"
        />
      </svg>
      {{ lang.t('nav.attractions') }}
    </a>

    <a routerLink="/tour-guide" class="nav-link" [class.active-link]="isTourGuideActive()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7"
        />
      </svg>
      {{ lang.t('nav.tourGuide') }}
    </a>

    <a routerLink="/Budget Planning" class="nav-link" [class.active-link]="isBudgetActive()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 6h-4v1h3c.55 0 1 .45 1 1v3c0 .55-.45 1-1 1h-1v1h-2v-1H9v-2h4v-1h-3c-.55 0-1-.45-1-1V9c0-.55.45-1 1-1h1V7h2v1h2v2z"
        />
      </svg>
      {{ lang.t('nav.budgetPlanning') }}
    </a>
  </div>

  <!-- ── ROW 3 ── -->
  <div class="row-search">
    <div class="search-wrap">
      <input type="text" class="search-input" [placeholder]="lang.t('nav.search')" />
      <button class="search-btn" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#0d1526">
          <path
            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
          />
        </svg>
      </button>
    </div>
  </div>

  <app-register *ngIf="modal.activeModal() === 'signup'"></app-register>
  <app-login *ngIf="modal.activeModal() === 'login'"></app-login>
  <app-forgot-password *ngIf="modal.activeModal() === 'forgot-password'"></app-forgot-password>
  <app-enter-code *ngIf="modal.activeModal() === 'enter-code'"></app-enter-code>
  <app-reset-password *ngIf="modal.activeModal() === 'reset-password'"></app-reset-password>
</nav>
